<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>gpt-image-2 生成器 (Cloudflare版) 1</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 0; background: #0b1020; color: #e8ecff; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 22px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:14px; }
    .brand { font-weight:700; letter-spacing:.2px; }
    .grid { display:grid; grid-template-columns: 1.5fr 1fr; gap:14px; }
    .card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.10); border-radius:16px; padding:16px; box-shadow:0 10px 30px rgba(0,0,0,0.25); }
    h1 { font-size:18px; margin:0 0 10px; }
    label { display:block; font-size:12px; opacity:.9; margin:10px 0 6px; }
    textarea, select, input[type=text], input[type=number], input[type=password] { width:100%; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,0.14); background:rgba(0,0,0,0.25); color:inherit; font-size:14px; }
    textarea { min-height:140px; resize:vertical; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .btn { margin-top:12px; display:inline-flex; gap:8px; align-items:center; padding:10px 18px; border-radius:999px; border:1px solid rgba(255,255,255,0.18); background:rgba(90,120,255,0.30); cursor:pointer; color:inherit; font-size:14px; width: 100%; justify-content: center;}
    .btn:hover:not(:disabled) { background:rgba(90,120,255,0.45); }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .gallery { margin-top:12px; display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; }
    .imgcard { border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,0.10); background:rgba(0,0,0,0.2); }
    .imgcard img { width:100%; height:auto; display:block; }
    .imgmeta { padding:8px 12px; font-size:12px; display:flex; justify-content:space-between; gap:8px; }
    .muted { opacity:.75; font-size:12px; line-height:1.5; }
    .history-item { padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.10); background:rgba(0,0,0,0.18); margin-bottom:10px; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.2); border-top-color:#7fa7ff; border-radius:50%; animation:spin .7s linear infinite; }
    .hidden { display:none !important; }
    .split { display:grid; gap:14px; }
    .summary-btn { width:100%; text-align:left; color:inherit; cursor:pointer; }
    .summary-btn.active { border-color:rgba(127,167,255,0.5); background:rgba(127,167,255,0.12); }
    .summary-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:6px; }
    .summary-title { font-size:13px; font-weight:600; max-width:75%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .summary-meta { font-size:12px; opacity:.8; }
    .status-badge { font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid rgba(255,255,255,0.2); white-space:nowrap; }
    .status-processing { color:#ffe1a8; border-color:rgba(255,225,168,0.45); background:rgba(255,225,168,0.12); }
    .status-completed { color:#b7f7c1; border-color:rgba(183,247,193,0.45); background:rgba(183,247,193,0.12); }
    .status-failed { color:#ffc0c0; border-color:rgba(255,192,192,0.45); background:rgba(255,192,192,0.14); }
    .detail-prompt { font-size:13px; margin-top:10px; white-space:pre-wrap; line-height:1.5; }
    .btn-ghost { padding:8px 12px; border-radius:999px; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.06); color:inherit; cursor:pointer; }
    .btn-ghost:hover { background:rgba(255,255,255,0.12); }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media(max-width:720px) { .grid { grid-template-columns:1fr; } .row3 { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">🖼️ gpt-image-2 Serverless 生成器</div>
    <button id="logout-btn" class="btn-ghost hidden" type="button">退出登录</button>
  </div>

  <div class="card" id="login-card">
    <h1>登录</h1>
    <label>密码 (访问口令)</label>
    <input type="password" id="login_password" placeholder="输入访问口令" required />
    <button class="btn" id="login-btn" type="button">登录并加载云端记录</button>
    <div id="login-msg" class="muted" style="margin-top:8px;">登录后可查看云端历史记录</div>
  </div>

  <div class="grid hidden" id="app-grid">
    <div class="card">
      <h1>生成设置</h1>
      <form id="gen-form">
        <label style="margin-top:12px;">Prompt</label>
        <textarea id="prompt" placeholder="Describe the image..." required>A photograph of a red fox in an autumn forest</textarea>

        <div class="row3">
          <div>
            <label>Size</label>
            <select id="size">
              <option value="1024x1024">1024x1024</option>
              <option value="1024x1536">1024x1536</option>
              <option value="1536x1024">1536x1024</option>
            </select>
          </div>
          <div>
            <label>Quality</label>
            <select id="quality">
              <option value="low">low</option>
              <option value="medium" selected>medium</option>
              <option value="high">high</option>
            </select>
          </div>
          <div>
            <label>Format</label>
            <select id="format">
              <option value="png">png</option>
              <option value="jpeg">jpeg</option>
              <option value="webp">webp</option>
            </select>
          </div>
        </div>

        <div class="row2">
          <div>
            <label>n（张数 1-8）</label>
            <input id="n_images" type="number" min="1" max="8" value="1">
          </div>
        </div>

        <button class="btn" id="gen-btn" type="submit">🚀 开始生成</button>
      </form>
    </div>

    <div class="split">
      <div class="card">
        <h1>云端简略记录</h1>
        <div class="muted">先展示简略信息，点击某条后才加载详细内容与图片。</div>
        <div id="history-container" style="margin-top: 12px;"></div>
      </div>

      <div class="card">
        <h1>详细信息</h1>
        <div id="detail-empty" class="muted">点击右侧任一记录查看详细信息。</div>
        <div id="detail-content" class="hidden">
          <div id="detail-meta" class="muted"></div>
          <div id="detail-prompt" class="detail-prompt"></div>
          <div id="detail-gallery" class="gallery"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const POLL_FAST_MS = 2000;
  const POLL_IDLE_MS = 6000;

  const state = {
    password: '',
    records: [],
    selectedRecordId: null,
    detailStatus: null,
    inFlightSubmitCount: 0
  };

  let historyPollTimer = null;
  let historyPollInFlight = false;

  const loginCard = document.getElementById('login-card');
  const appGrid = document.getElementById('app-grid');
  const loginInput = document.getElementById('login_password');
  const loginBtn = document.getElementById('login-btn');
  const loginMsg = document.getElementById('login-msg');
  const logoutBtn = document.getElementById('logout-btn');
  const form = document.getElementById('gen-form');
  const genBtn = document.getElementById('gen-btn');
  const historyContainer = document.getElementById('history-container');
  const detailEmpty = document.getElementById('detail-empty');
  const detailContent = document.getElementById('detail-content');
  const detailMeta = document.getElementById('detail-meta');
  const detailPrompt = document.getElementById('detail-prompt');
  const detailGallery = document.getElementById('detail-gallery');

  function formatTime(isoTime) {
    if (!isoTime) return '-';
    return new Date(isoTime).toLocaleString();
  }

  function normalizeStatus(status) {
    if (status === 'processing' || status === 'completed' || status === 'failed') {
      return status;
    }
    return 'completed';
  }

  function statusText(status) {
    const normalized = normalizeStatus(status);
    if (normalized === 'processing') return '正在生成';
    if (normalized === 'failed') return '失败';
    return '已完成';
  }

  function statusClass(status) {
    const normalized = normalizeStatus(status);
    if (normalized === 'processing') return 'status-processing';
    if (normalized === 'failed') return 'status-failed';
    return 'status-completed';
  }

  function toPromptPreview(prompt) {
    const cleaned = String(prompt || '').trim().replace(/\s+/g, ' ');
    if (cleaned.length <= 80) return cleaned;
    return `${cleaned.slice(0, 80)}...`;
  }

  function updateGenButtonText() {
    if (state.inFlightSubmitCount > 0) {
      genBtn.textContent = `🚀 开始生成（提交中 ${state.inFlightSubmitCount}）`;
      return;
    }
    genBtn.textContent = '🚀 开始生成';
  }

  function stopHistoryPolling() {
    if (historyPollTimer) {
      clearTimeout(historyPollTimer);
      historyPollTimer = null;
    }
  }

  function scheduleHistoryPolling(delayMs) {
    stopHistoryPolling();
    if (!state.password) return;
    historyPollTimer = setTimeout(runHistoryPolling, delayMs);
  }

  async function runHistoryPolling() {
    if (!state.password) return;
    if (historyPollInFlight) {
      scheduleHistoryPolling(POLL_FAST_MS);
      return;
    }

    historyPollInFlight = true;
    try {
      await loadHistory({ showLoading: false });
      if (state.selectedRecordId && state.detailStatus === 'processing') {
        const selected = state.records.find((item) => item.id === state.selectedRecordId);
        if (selected && normalizeStatus(selected.status) !== 'processing') {
          await loadRecordDetail(state.selectedRecordId);
        }
      }
    } catch {
      // 轮询失败时保持静默，避免打断用户操作
    } finally {
      historyPollInFlight = false;
      const hasProcessing = state.records.some(
        (item) => normalizeStatus(item.status) === 'processing'
      );
      scheduleHistoryPolling(hasProcessing ? POLL_FAST_MS : POLL_IDLE_MS);
    }
  }

  function setLoggedIn(loggedIn) {
    loginCard.classList.toggle('hidden', loggedIn);
    appGrid.classList.toggle('hidden', !loggedIn);
    logoutBtn.classList.toggle('hidden', !loggedIn);
  }

  function clearDetail(message) {
    state.detailStatus = null;
    detailContent.classList.add('hidden');
    detailEmpty.classList.remove('hidden');
    detailEmpty.textContent = message;
    detailMeta.textContent = '';
    detailPrompt.textContent = '';
    detailGallery.innerHTML = '';
  }

  async function apiRequest(path, options = {}) {
    const requestOptions = { ...options };
    requestOptions.headers = { ...(options.headers || {}) };
    if (state.password) {
      requestOptions.headers['x-ui-password'] = state.password;
    }
    if (requestOptions.body !== undefined && !requestOptions.headers['Content-Type']) {
      requestOptions.headers['Content-Type'] = 'application/json';
    }

    const res = await fetch(path, requestOptions);
    let data = {};
    try {
      data = await res.json();
    } catch {
      data = {};
    }
    if (!res.ok) {
      throw new Error(data.error || `请求失败 (${res.status})`);
    }
    return data;
  }

  function renderHistoryList() {
    historyContainer.innerHTML = '';

    if (!state.records.length) {
      const empty = document.createElement('div');
      empty.className = 'muted';
      empty.textContent = '云端还没有记录，先生成一张试试。';
      historyContainer.appendChild(empty);
      return;
    }

    state.records.forEach((record) => {
      const status = normalizeStatus(record.status);
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'history-item summary-btn';
      if (record.id === state.selectedRecordId) {
        item.classList.add('active');
      }

      const top = document.createElement('div');
      top.className = 'summary-top';

      const title = document.createElement('div');
      title.className = 'summary-title';
      title.textContent = record.promptPreview || '(无 Prompt)';

      const badge = document.createElement('span');
      badge.className = `status-badge ${statusClass(status)}`;
      badge.textContent = statusText(status);

      const meta = document.createElement('div');
      meta.className = 'summary-meta';
      meta.textContent = `${formatTime(record.createdAt)} · ${record.count || 0} 张 · ${record.size || '-'} · ${record.quality || '-'} · ${record.format || '-'}`;

      top.appendChild(title);
      top.appendChild(badge);
      item.appendChild(top);
      item.appendChild(meta);

      if (status === 'failed' && record.error) {
        const errLine = document.createElement('div');
        errLine.className = 'muted';
        errLine.style.marginTop = '6px';
        errLine.textContent = `失败原因: ${record.error}`;
        item.appendChild(errLine);
      }

      item.addEventListener('click', () => {
        loadRecordDetail(record.id);
      });

      historyContainer.appendChild(item);
    });
  }

  function renderRecordDetail(record) {
    const status = normalizeStatus(record.status);
    state.detailStatus = status;
    detailEmpty.classList.add('hidden');
    detailContent.classList.remove('hidden');

    detailMeta.textContent = `${statusText(status)} · ${formatTime(record.createdAt)} · ${record.count || 0} 张 · ${record.size || '-'} · ${record.quality || '-'} · ${record.format || '-'}`;
    detailPrompt.textContent = record.prompt || '';
    detailGallery.innerHTML = '';

    if (status === 'processing') {
      const pending = document.createElement('div');
      pending.className = 'muted';
      pending.textContent = '任务正在后台生成，列表会自动刷新状态。';
      detailGallery.appendChild(pending);
      return;
    }

    if (status === 'failed') {
      const failed = document.createElement('div');
      failed.className = 'muted';
      failed.textContent = `生成失败: ${record.error || '未知错误'}`;
      detailGallery.appendChild(failed);
      return;
    }

    const images = Array.isArray(record.images) ? record.images : [];
    if (!images.length) {
      const noImage = document.createElement('div');
      noImage.className = 'muted';
      noImage.textContent = '这条记录没有可展示的图片数据。';
      detailGallery.appendChild(noImage);
      return;
    }

    images.forEach((image, idx) => {
      const format = ['png', 'jpeg', 'webp'].includes(image.format) ? image.format : 'png';
      const dataUrl = `data:image/${format};base64,${image.b64}`;

      const card = document.createElement('div');
      card.className = 'imgcard';

      const img = document.createElement('img');
      img.src = dataUrl;
      img.alt = `generated-${idx + 1}`;

      const meta = document.createElement('div');
      meta.className = 'imgmeta';

      const label = document.createElement('span');
      label.textContent = `Result ${idx + 1}`;

      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = `${record.id}_${idx + 1}.${format}`;
      link.textContent = '下载';
      link.style.color = '#bcd0ff';

      meta.appendChild(label);
      meta.appendChild(link);
      card.appendChild(img);
      card.appendChild(meta);
      detailGallery.appendChild(card);
    });
  }

  async function loadHistory(options = {}) {
    const showLoading = options.showLoading !== false;
    if (showLoading) {
      historyContainer.innerHTML = '<div class="muted">加载中...</div>';
    }
    try {
      const data = await apiRequest('/api/history?limit=50');
      state.records = Array.isArray(data.records) ? data.records : [];
      renderHistoryList();
    } catch (err) {
      if (String(err.message).includes('Unauthorized') || String(err.message).includes('访问口令错误')) {
        logout();
        loginMsg.textContent = '口令校验失败，请重新登录。';
      }
      throw err;
    }
  }

  async function loadRecordDetail(recordId) {
    state.selectedRecordId = recordId;
    renderHistoryList();
    clearDetail('详细信息加载中...');

    try {
      const data = await apiRequest(`/api/history?id=${encodeURIComponent(recordId)}&includeImages=1`);
      if (!data.record) {
        clearDetail('未找到详细信息。');
        return;
      }
      renderRecordDetail(data.record);
    } catch (err) {
      if (String(err.message).includes('Unauthorized') || String(err.message).includes('访问口令错误')) {
        logout();
        loginMsg.textContent = '口令校验失败，请重新登录。';
        return;
      }
      clearDetail(`加载详细信息失败: ${err.message}`);
    }
  }

  async function login(password) {
    state.password = password;
    stopHistoryPolling();
    await apiRequest('/api/login', {
      method: 'POST',
      body: JSON.stringify({ password })
    });
    await loadHistory();
    sessionStorage.setItem('ui_password', password);
    loginMsg.textContent = '';
    setLoggedIn(true);
    clearDetail('点击右侧任一记录查看详细信息。');
    scheduleHistoryPolling(POLL_FAST_MS);
    updateGenButtonText();
  }

  function logout() {
    stopHistoryPolling();
    state.password = '';
    state.records = [];
    state.selectedRecordId = null;
    state.detailStatus = null;
    state.inFlightSubmitCount = 0;
    sessionStorage.removeItem('ui_password');
    setLoggedIn(false);
    historyContainer.innerHTML = '';
    clearDetail('点击右侧任一记录查看详细信息。');
    updateGenButtonText();
  }

  loginBtn.addEventListener('click', async () => {
    const password = loginInput.value.trim();
    if (!password) {
      loginMsg.textContent = '请输入访问口令。';
      return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> 登录中...';
    loginMsg.textContent = '';

    try {
      await login(password);
    } catch (err) {
      logout();
      loginMsg.textContent = `登录失败: ${err.message}`;
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = '登录并加载云端记录';
    }
  });

  logoutBtn.addEventListener('click', () => {
    logout();
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!state.password) {
      alert('请先登录再提交任务。');
      return;
    }

    const payload = {
      password: state.password,
      prompt: document.getElementById('prompt').value,
      size: document.getElementById('size').value,
      quality: document.getElementById('quality').value,
      format: document.getElementById('format').value,
      n: parseInt(document.getElementById('n_images').value, 10)
    };
    const optimisticId = `local_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    const optimisticRecord = {
      id: optimisticId,
      createdAt: new Date().toISOString(),
      promptPreview: toPromptPreview(payload.prompt),
      size: payload.size,
      quality: payload.quality,
      format: payload.format,
      status: 'processing',
      count: payload.n,
      error: null
    };
    state.records.unshift(optimisticRecord);
    renderHistoryList();

    state.inFlightSubmitCount += 1;
    updateGenButtonText();

    try {
      const data = await apiRequest('/api/generate', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      const summary = data.summary || {};
      const recordId = summary.id || data.recordId || optimisticId;
      const mergedRecord = {
        ...optimisticRecord,
        ...summary,
        id: recordId,
        status: normalizeStatus(summary.status || 'processing'),
        error: summary.error || null
      };
      const optimisticIndex = state.records.findIndex((item) => item.id === optimisticId);
      if (optimisticIndex >= 0) {
        state.records.splice(optimisticIndex, 1, mergedRecord);
      }
      // 更新 selectedRecordId：旧的乐观 ID 已被替换为真实 ID，轮询需要用真实 ID 才能自动刷新详情
      if (state.selectedRecordId === optimisticId) {
        state.selectedRecordId = recordId;
      }
      renderHistoryList();
      await loadRecordDetail(recordId);
      scheduleHistoryPolling(600);
    } catch (err) {
      const optimisticIndex = state.records.findIndex((item) => item.id === optimisticId);
      if (optimisticIndex >= 0) {
        state.records.splice(optimisticIndex, 1, {
          ...optimisticRecord,
          status: 'failed',
          count: 0,
          error: err.message
        });
        renderHistoryList();
      }
      alert(`提交生成任务失败: ${err.message}`);
    } finally {
      state.inFlightSubmitCount = Math.max(0, state.inFlightSubmitCount - 1);
      updateGenButtonText();
    }
  });

  (async function init() {
    updateGenButtonText();
    clearDetail('点击右侧任一记录查看详细信息。');
    const savedPassword = sessionStorage.getItem('ui_password');
    if (!savedPassword) {
      setLoggedIn(false);
      return;
    }

    loginInput.value = savedPassword;
    try {
      await login(savedPassword);
    } catch {
      logout();
      loginMsg.textContent = '登录已过期，请重新输入口令。';
    }
  })();
</script>
</body>
</html>
